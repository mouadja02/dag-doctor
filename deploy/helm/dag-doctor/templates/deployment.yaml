apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dag-doctor.fullname" . }}
  labels:
    {{- include "dag-doctor.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "dag-doctor.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dag-doctor.labels" . | nindent 8 }}
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgresql.username }}:{{ .Values.postgresql.password }}@{{ .Values.postgresql.host }}:{{ .Values.postgresql.port }}/{{ .Values.postgresql.database }}"
            - name: AIRFLOW_BASE_URL
              value: "{{ .Values.airflow.baseUrl }}"
            - name: AIRFLOW_USERNAME
              value: "{{ .Values.airflow.username }}"
            - name: AIRFLOW_PASSWORD
              value: "{{ .Values.airflow.password }}"
            - name: LLM_PROVIDER
              value: "{{ .Values.llm.provider }}"
            - name: OPENROUTER_API_KEY
              value: "{{ .Values.llm.apiKey }}"
            - name: SECRET_KEY
              value: "{{ .Values.security.secretKey }}"
            - name: ALLOWED_ORIGINS
              value: '{{ join "," .Values.security.allowedOrigins }}'
            - name: LOG_LEVEL
              value: INFO
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dag-doctor.fullname" . }}
  labels:
    {{- include "dag-doctor.labels" . | nindent 4 }}
    {{- if .Values.metrics.enabled }}
    prometheus.io/scrape: "true"
    prometheus.io/port: "{{ .Values.service.metricsPort }}"
    prometheus.io/path: "/metrics"
    {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      name: http
  selector:
    {{- include "dag-doctor.selectorLabels" . | nindent 4 }}
